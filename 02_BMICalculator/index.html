<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css"
        integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"
        integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="d-flex m-2 p-2">
       <button class="btn btn-secondary">Home</button>
       <button class="btn btn-secondary" style="width: 200px;">YouTube Channel</button>
    </nav>
    <div class="d-block m-3 p-4 text-center">
        <h1 class="text-center text-danger font-weight-bolder">BMI Calculator</h1>
        <form>
            <div><Label class="mr-3 text-info font-weight-bold">Height in CM: </Label><input class="mt-4" style="width:150px; height: 25px;" type="text" id="height"></div>
            <div><label class="mr-3 text-info font-weight-bold">Weight in KG: </label><input class="mt-4" style="width:150px; height: 25px;" type="text" id="weight"></div>
            <button class="p-2 m-4 btn-info border-light" style="width:100px; font-weight: bold;">Calculate</button>
            <div id="results"></div>
            <div id="weight-guide" class="text-center mt-4" >
                <h3 class="text-secondary">BMI Weight Guide</h3>
                <p class="text-success">Under Weight : Less than 18.6</p>
                <p class="text-primary">Normal Range : 18.6 to 24.9</p>
                <p class="text-danger">Over Wight : Greater than 24.9</p>
            </div>
        </form>
    </div>
</body>
 <script src="./script.js"></script>
</html>
