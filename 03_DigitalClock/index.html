<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css"
        integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/js/bootstrap.min.js"
        integrity="sha384-oesi62hOLfzrys4LxRF63OJCXdXDipiYWBnvTl9Y9/TRlw5xlKIEHpNyvvDShgf/"
        crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(197, 194, 194);
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            margin: 1rem;
            gap: 2rem;
            border-bottom: 2px solid black;
        }

        nav a {
            text-decoration: none;
            color: black;
            border: 1px solid black;
            padding: 0.7rem;
            border-radius: 5px;
            background-color: rgb(210, 212, 214);
        }
        #clock{
            border: 2px solid white;
            width: 200px;
            height: 50px;
            background-color: orange;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>

<body>
    <nav class="d-flex m-2 p-2">
        <button class="btn btn-secondary">Home</button>
        <button class="btn btn-secondary" style="width: 200px;">YouTube Channel</button>
    </nav>
    <div class="d-flex justify-content-center align-items-center bg-dark text-white"
        style="height: 100vh; flex-direction: column; font-weight: bolder; font-size: 2rem;">
        <div id="banner"><span>Your local Time</span></div>
        <div id="clock" ></div>
    </div>
</body>
<script src="./script.js"></script>

</html>
